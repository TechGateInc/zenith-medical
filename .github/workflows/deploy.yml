name: CI/CD Pipeline - Zenith Medical Centre

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18.x'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Security and Code Quality Checks
  security:
    name: Security & Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Run TypeScript Check
      run: npx tsc --noEmit

    - name: Security Audit
      run: npm audit --audit-level=high

    - name: Check for Secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified

    - name: CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: javascript, typescript

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # Testing
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: security
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zenith_medical_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Setup Test Environment
      run: |
        cp .env.example .env.test
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/zenith_medical_test" >> .env.test
        echo "NEXTAUTH_SECRET=test-secret" >> .env.test
        echo "ENCRYPTION_KEY=test-encryption-key-32-chars-long" >> .env.test

    - name: Setup Database
      run: |
        export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/zenith_medical_test
        npx prisma migrate dev --name init
        npx prisma generate

    - name: Run Tests
      run: npm test -- --coverage --watchAll=false
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zenith_medical_test
        NEXTAUTH_SECRET: test-secret
        ENCRYPTION_KEY: test-encryption-key-32-chars-long

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info
        fail_ci_if_error: true

  # Build and Deploy to Vercel
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [security, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Vercel CLI
      run: npm install --global vercel@latest

    - name: Pull Vercel Environment Information
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

    - name: Build Project Artifacts
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

    - name: Deploy Project Artifacts to Vercel
      run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

    - name: Assign Domain (if configured)
      if: ${{ secrets.VERCEL_DOMAIN }}
      run: vercel alias --token=${{ secrets.VERCEL_TOKEN }} ${{ secrets.VERCEL_DOMAIN }}

  # Preview Deployment for PRs
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [security, test]
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Vercel CLI
      run: npm install --global vercel@latest

    - name: Pull Vercel Environment Information
      run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

    - name: Build Project Artifacts
      run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

    - name: Deploy Project Artifacts to Vercel
      id: deploy
      run: |
        url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
        echo "preview_url=$url" >> $GITHUB_OUTPUT

    - name: Comment PR with Preview URL
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🚀 Preview deployment is ready! \n\n✅ Preview URL: ${{ steps.deploy.outputs.preview_url }}`
          })

  # Health Check After Deployment
  health-check:
    name: Post-Deployment Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Wait for Deployment
      run: sleep 30

    - name: Health Check - Homepage
      run: |
        response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PRODUCTION_URL }})
        if [ $response -ne 200 ]; then
          echo "Health check failed: HTTP $response"
          exit 1
        fi
        echo "✅ Homepage health check passed"

    - name: Health Check - API
      run: |
        response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PRODUCTION_URL }}/api/health)
        if [ $response -ne 200 ]; then
          echo "API health check failed: HTTP $response"
          exit 1
        fi
        echo "✅ API health check passed"

    - name: Notify on Failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 Production Deployment Health Check Failed',
            body: `
            ## Deployment Health Check Failed
            
            **Workflow:** ${{ github.workflow }}
            **Run:** ${{ github.run_id }}
            **Commit:** ${{ github.sha }}
            **Actor:** ${{ github.actor }}
            
            Please investigate the deployment immediately.
            `,
            labels: ['bug', 'production', 'urgent']
          })

  # HIPAA Compliance Check
  compliance-check:
    name: HIPAA/PIPEDA Compliance Check
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Compliance Checks
      run: |
        # This would run custom compliance validation scripts
        echo "🔍 Running HIPAA/PIPEDA compliance checks..."
        
        # Check for PHI encryption
        if ! grep -r "encrypt" src/lib/utils/encryption.ts; then
          echo "❌ Encryption utilities not found"
          exit 1
        fi
        
        # Check for audit logging
        if ! grep -r "auditLog" src/; then
          echo "❌ Audit logging not properly implemented"
          exit 1
        fi
        
        # Check security headers
        if ! grep -r "Content-Security-Policy" vercel.json; then
          echo "❌ Security headers not configured"
          exit 1
        fi
        
        echo "✅ Basic compliance checks passed"

    - name: Trigger Production Compliance Scan
      run: |
        # This would trigger the automated compliance check endpoint
        curl -X POST "${{ secrets.PRODUCTION_URL }}/api/admin/compliance/check" \
          -H "Authorization: Bearer ${{ secrets.COMPLIANCE_CHECK_TOKEN }}" || true

  # Backup Verification
  backup-check:
    name: Verify Backup System
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Test Backup Endpoint
      run: |
        # Verify backup endpoint is accessible (without triggering actual backup)
        response=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.PRODUCTION_URL }}/api/admin/backup/database")
        if [ $response -eq 401 ] || [ $response -eq 403 ]; then
          echo "✅ Backup endpoint properly secured"
        else
          echo "❌ Backup endpoint security check failed: HTTP $response"
          exit 1
        fi 